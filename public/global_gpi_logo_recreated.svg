<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">GLOBAL GPI globe leaf logo recreation</title>
  <desc id="desc">Vector recreation of a blue longitude-latitude globe with two green sweeping leaf ribbons.</desc>
  <defs>
    <linearGradient id="greenA" x1="110" y1="390" x2="425" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b5f2d"/>
      <stop offset="0.45" stop-color="#168343"/>
      <stop offset="1" stop-color="#0a4f2b"/>
    </linearGradient>
    <linearGradient id="greenB" x1="70" y1="320" x2="410" y2="95" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0e6c36"/>
      <stop offset="0.55" stop-color="#1b8d4d"/>
      <stop offset="1" stop-color="#083f25"/>
    </linearGradient>
    <clipPath id="globeClip">
      <circle cx="256" cy="256" r="205"/>
    </clipPath>
  </defs>

  <!-- globe -->
  <circle cx="256" cy="256" r="205" fill="none" stroke="#11599f" stroke-width="19"/>
  <g clip-path="url(#globeClip)" fill="none" stroke="#11599f" stroke-width="12" stroke-linecap="round" opacity="0.98">
    <!-- latitude lines -->
    <ellipse cx="256" cy="256" rx="190" ry="67"/>
    <ellipse cx="256" cy="256" rx="186" ry="130"/>
    <path d="M78 187 C144 215 201 228 256 228 C314 228 372 215 434 187"/>
    <path d="M78 325 C145 297 202 284 256 284 C314 284 372 297 434 325"/>
    <!-- longitude lines -->
    <ellipse cx="256" cy="256" rx="72" ry="204"/>
    <path d="M256 52 C187 107 154 178 154 256 C154 334 187 405 256 460"/>
    <path d="M256 52 C325 107 358 178 358 256 C358 334 325 405 256 460"/>
    <line x1="256" y1="56" x2="256" y2="456"/>
  </g>

  <!-- white separation under ribbons -->
  <path d="M48 346 C127 292 205 238 297 184 C351 153 400 124 462 74 C430 166 361 257 274 327 C200 386 119 415 52 417 C75 393 94 370 110 346 C87 350 66 350 48 346Z" fill="#ffffff"/>
  <path d="M66 279 C142 245 214 205 293 151 C348 113 390 78 443 23 C428 111 378 188 302 250 C226 311 139 343 57 347 C78 322 96 300 112 276 C95 281 80 282 66 279Z" fill="#ffffff"/>

  <!-- green sweeping bands -->
  <path d="M58 337 C142 287 219 235 303 180 C354 146 402 112 451 66 C435 137 392 209 321 271 C242 340 145 389 51 403 C78 378 99 353 116 327 C94 335 74 339 58 337Z" fill="url(#greenA)"/>
  <path d="M73 267 C154 235 226 193 302 140 C354 104 396 68 435 25 C421 94 381 158 314 213 C238 275 141 321 59 331 C83 310 103 288 120 263 C100 270 84 272 73 267Z" fill="url(#greenB)"/>

  <!-- highlight ridge on top ribbon -->
  <path d="M99 286 C181 257 242 220 311 173 C356 142 391 113 420 84" fill="none" stroke="#e6f4e9" stroke-width="8" stroke-linecap="round" opacity="0.72"/>
  <path d="M93 359 C176 317 245 272 317 215 C363 178 397 144 423 111" fill="none" stroke="#d5ecd9" stroke-width="7" stroke-linecap="round" opacity="0.55"/>

  <!-- restore visible globe arcs at edges -->
  <path d="M91 122 A205 205 0 0 1 430 380" fill="none" stroke="#11599f" stroke-width="11" stroke-linecap="round" opacity="0.9"/>
  <path d="M83 392 A205 205 0 0 0 424 390" fill="none" stroke="#11599f" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
</svg>
