<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Global GPI logo recreated vector">
  <defs>
    <clipPath id="globeClip">
      <circle cx="256" cy="256" r="197"/>
    </clipPath>
    <linearGradient id="greenRibbon" x1="117" y1="332" x2="421" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a6d38"/>
      <stop offset="0.45" stop-color="#0b7a3d"/>
      <stop offset="1" stop-color="#064c2e"/>
    </linearGradient>
    <linearGradient id="greenRibbonDark" x1="101" y1="292" x2="424" y2="146" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#064427"/>
      <stop offset="1" stop-color="#0a6f39"/>
    </linearGradient>
  </defs>

  <!-- Globe outline -->
  <circle cx="256" cy="256" r="197" fill="none" stroke="#1263ad" stroke-width="18"/>

  <!-- Globe grid -->
  <g clip-path="url(#globeClip)" fill="none" stroke="#1263ad" stroke-width="12" stroke-linecap="round">
    <!-- Latitudes -->
    <path d="M64 203 C115 174 178 159 256 159 C334 159 397 174 448 203"/>
    <path d="M58 256 C116 236 183 226 256 226 C329 226 396 236 454 256"/>
    <path d="M72 314 C124 334 184 344 256 344 C328 344 388 334 440 314"/>

    <!-- Longitudes -->
    <path d="M256 61 C209 108 184 176 184 256 C184 336 209 404 256 451"/>
    <path d="M256 61 C303 108 328 176 328 256 C328 336 303 404 256 451"/>
    <path d="M256 60 L256 452"/>

    <!-- diagonal meridian feel visible on source -->
    <path d="M116 117 C189 159 275 228 396 395" opacity="0.95"/>
  </g>

  <!-- White edge separators that mimic the original leaf/swoosh cutouts -->
  <path d="M70 315 C158 300 228 260 303 208 C350 176 392 145 440 132 C404 186 346 244 274 295 C203 345 137 367 70 365 Z" fill="#ffffff"/>
  <path d="M76 356 C162 349 242 306 325 249 C368 220 407 203 447 198 C410 246 355 300 287 346 C211 397 139 412 76 398 Z" fill="#ffffff"/>

  <!-- Main lower green ribbon -->
  <path d="M62 342 C151 330 226 287 305 232 C356 196 403 166 455 154 C422 211 361 277 285 330 C206 386 128 407 62 396 Z" fill="url(#greenRibbon)"/>

  <!-- Upper green ribbon -->
  <path d="M86 289 C157 272 221 236 288 190 C335 158 376 134 427 122 C394 171 344 219 280 263 C215 308 151 333 86 337 Z" fill="url(#greenRibbonDark)"/>

  <!-- Small pointed leaf-like tail at right/top -->
  <path d="M414 113 C434 98 452 78 465 51 C471 90 462 129 439 158 C430 143 422 128 414 113 Z" fill="#064c2e"/>

  <!-- Subtle highlight lines on green ribbons -->
  <path d="M104 331 C185 313 247 276 315 229 C355 201 388 180 425 168" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity="0.38"/>
  <path d="M116 289 C179 273 232 242 291 201 C328 175 359 157 392 145" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.30"/>
</svg>
